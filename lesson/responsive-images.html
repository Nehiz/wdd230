<html lang="en">

<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/responsive-images.css">
    <title>Responsive-Images</title>
    <meta name="description"
    content="The work of responsive image design is to support smaller page weigjhts and to deliver content based upon screen sizes.">
    <meta name="author" content="Nehikhare Efehi">
    <!-- Additional meta tags, stylesheets, or scripts can be added here -->
</head>

<body>
    <header>
        <!-- Page header content goes here -->
        <h1>Aba Temple Nigeria</h1>
        <nav>
            <!-- Navigation menu goes here -->
        </nav>
    </header>

    <main>
        <!-- Main content goes here -->
        <div class="hero">
            <picture>
                <source srcset="images/hero-small.webp" media="(max-width:500px)">
                <source srcset="images/hero-medium.webp" media="(max-width:1000px)">
                <img src="images/hero-large.webp" alt="hero-large" width="1500" height="750">

            </picture>
        </div>

        <!-- More sections or content as needed -->
